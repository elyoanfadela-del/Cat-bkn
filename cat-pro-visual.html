<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CAT BKN SIMULATOR</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family:Arial; text-align:center; margin:10px;}
.timer {color:red; font-size:22px;}
button {width:100%; padding:10px; margin:5px; font-size:16px;}
.hidden {display:none;}
</style>
</head>

<body>

<h2 id="title">CAT BKN SIMULATOR</h2>
<div class="timer" id="timer"></div>
<div id="question"></div>
<div id="answers"></div>
<button onclick="nextQuestion()">Next</button>

<script>
let subtestIndex = 0;
let currentQuestion = 0;
let score = 0;
let wrong = 0;
let timer;
let timeLeft = 420;

const subtests = [

{
name:"Bahasa",
questions: Array.from({length:50}, (_,i)=>({
q:"Sinonim kata ke-"+(i+1)+"?",
a:["A","B","C","D"],
correct:Math.floor(Math.random()*4)
}))
},

{
name:"Hitungan",
questions: Array.from({length:31}, (_,i)=>({
q:(i+2)+" + "+(i+3)+" = ?",
a:[i+5,i+6,i+7,i+8],
correct:0
}))
},

{
name:"Pengetahuan Umum",
questions: Array.from({length:40}, (_,i)=>({
q:"Ibukota negara ke-"+(i+1)+"?",
a:["A","B","C","D"],
correct:Math.floor(Math.random()*4)
}))
},

{
name:"Pola Gambar",
questions: Array.from({length:55}, (_,i)=>({
q:"Pola gambar ke-"+(i+1),
a:["A","B","C","D"],
correct:Math.floor(Math.random()*4)
}))
},

{
name:"Abstrak Ruang",
questions: Array.from({length:27}, (_,i)=>({
q:"Kubus diputar ke-"+(i+1),
a:["A","B","C","D"],
correct:Math.floor(Math.random()*4)
}))
},

{
name:"Bentuk",
questions: Array.from({length:25}, (_,i)=>({
q:"Bentuk ke-"+(i+1),
a:["A","B","C","D"],
correct:Math.floor(Math.random()*4)
}))
}

];

// SHUFFLE
subtests.forEach(s=>{
s.questions.sort(()=>Math.random()-0.5);
});

function startTimer(){
timeLeft = 420;
timer = setInterval(()=>{
let m = Math.floor(timeLeft/60);
let s = timeLeft%60;
document.getElementById("timer").innerHTML =
(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
timeLeft--;

if(timeLeft<0){
clearInterval(timer);
nextSubtest();
}
},1000);
}

function loadQuestion(){
let sub = subtests[subtestIndex];
let q = sub.questions[currentQuestion];

document.getElementById("title").innerHTML =
"Subtes "+(subtestIndex+1)+" - "+sub.name+
" ("+(currentQuestion+1)+"/"+sub.questions.length+")";

document.getElementById("question").innerHTML = q.q;

let html="";
q.a.forEach((opt,i)=>{
html+=`<button onclick="answer(${i})">${String.fromCharCode(65+i)}. ${opt}</button>`;
});

document.getElementById("answers").innerHTML = html;
}

function answer(i){
let q = subtests[subtestIndex].questions[currentQuestion];
if(i===q.correct) score++;
else wrong++;
nextQuestion();
}

function nextQuestion(){
currentQuestion++;
if(currentQuestion < subtests[subtestIndex].questions.length){
loadQuestion();
}else{
nextSubtest();
}
}

function nextSubtest(){
clearInterval(timer);
subtestIndex++;

if(subtestIndex < subtests.length){
currentQuestion=0;
startTimer();
loadQuestion();
}else{
document.body.innerHTML =
"<h2>SELESAI</h2>"+
"<p>Benar: "+score+"</p>"+
"<p>Salah: "+wrong+"</p>";
}
}

// START
startTimer();
loadQuestion();

</script>

</body>
</html>
