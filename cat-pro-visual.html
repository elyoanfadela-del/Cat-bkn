<script>

// CONFIG
const config = [
{nama:"Bahasa", jumlah:50},
{nama:"Hitungan", jumlah:31},
{nama:"Pengetahuan Umum", jumlah:40},
{nama:"Pola Gambar", jumlah:55},
{nama:"Abstrak Ruang", jumlah:27},
{nama:"Bentuk", jumlah:25}
];

// UTIL
function shuffle(a){return a.sort(()=>Math.random()-0.5);}
function pickUnique(arr,n){
return shuffle(arr).slice(0,n);
}

// ================= BAHASA =================
function genBahasa(n){
let bank=[];

const sinonim = [
["besar","agung"],["cepat","sigap"],["cerdas","pintar"],
["indah","elok"],["kuat","kokoh"],["dingin","sejuk"],
["ramai","hiruk"],["tajam","runcing"],["baik","bagus"],
["ringan","enteng"]
];

const antonim = [
["besar","kecil"],["cepat","lambat"],["tinggi","rendah"],
["panas","dingin"],["kuat","lemah"],["terang","gelap"],
["ramai","sepi"],["tajam","tumpul"],["baik","buruk"],
["panjang","pendek"]
];

sinonim.forEach(s=>{
bank.push([`Sinonim '${s[0]}' ?`, shuffle([s[1],"acak1","acak2","acak3"]),"A"]);
});

antonim.forEach(a=>{
bank.push([`Antonim '${a[0]}' ?`, shuffle([a[1],"acak1","acak2","acak3"]),"A"]);
});

// tambah variasi kalimat
for(let i=0;i<50;i++){
bank.push([
"Kata yang tepat untuk 'anak ... belajar' ?",
shuffle(["sedang","akan","telah","ingin"]),
"A"
]);
}

return pickUnique(bank,n);
}

// ================= HITUNGAN =================
function genHitung(n){
let bank=[];
for(let i=0;i<200;i++){
let a=Math.floor(Math.random()*50);
let b=Math.floor(Math.random()*50);
let c=a+b;
bank.push([
`${a} + ${b} = ?`,
shuffle([c,c+1,c-1,c+2].map(String)),
"A"
]);
}
return pickUnique(bank,n);
}

// ================= PENGETAHUAN =================
function genUmum(n){
let bank=[
["Ibukota Indonesia?","Jakarta"],
["Planet terbesar?","Jupiter"],
["Presiden pertama?","Soekarno"],
["Benua terbesar?","Asia"],
["Air rumusnya?","H2O"],
["Gunung tertinggi?","Everest"],
["Laut terbesar?","Pasifik"],
["Negara maju?","Jepang"],
["Mata uang Jepang?","Yen"],
["Benua Afrika di?","Selatan"]
];

let soal=[];
for(let i=0;i<bank.length;i++){
let b=bank[i];
soal.push([
b[0],
shuffle([b[1],"opsi1","opsi2","opsi3"]),
"A"
]);
}

// tambah variasi random
for(let i=0;i<100;i++){
soal.push([
"Ibu kota provinsi Jawa Barat?",
shuffle(["Bandung","Bekasi","Bogor","Cirebon"]),
"A"
]);
}

return pickUnique(soal,n);
}

// ================= POLA VISUAL =================
function genPola(n){

let bank=[];

// Template urutan kegiatan
const cerita = [
["Bangun tidur","Mandi","Sarapan","Berangkat"],
["Menanam","Menyiram","Tumbuh","Panen"],
["Beli bahan","Memasak","Menyajikan","Makan"],
["Pakai sepatu","Keluar rumah","Naik kendaraan","Sampai tujuan"],
["Belajar","Ujian","Lulus","Wisuda"]
];

// Visual emoji (sebagai animasi sederhana)
const visual = {
"Bangun tidur":"😴➡️🙂",
"Mandi":"🚿",
"Sarapan":"🍞",
"Berangkat":"🏃",

"Menanam":"🌱",
"Menyiram":"💧",
"Tumbuh":"🌿",
"Panen":"🌾",

"Beli bahan":"🛒",
"Memasak":"🍳",
"Menyajikan":"🍽️",
"Makan":"😋",

"Pakai sepatu":"👟",
"Keluar rumah":"🚪",
"Naik kendaraan":"🚌",
"Sampai tujuan":"🏁",

"Belajar":"📚",
"Ujian":"📝",
"Lulus":"🎓",
"Wisuda":"🎉"
};

// Generator soal
for(let i=0;i<200;i++){

let c = cerita[i % cerita.length];

// acak urutan
let acak = shuffle([...c]);

// jawaban benar = urutan asli
let benar = c.join("-");

// opsi (buat 4 kemungkinan)
let opsi = [
acak.join("-"),
shuffle([...c]).join("-"),
shuffle([...c]).join("-"),
benar
];

// acak opsi
opsi = shuffle(opsi);

// soal tampilan
let tampil = acak.map(x=>visual[x]).join(" ➜ ");

bank.push([
`Susun urutan yang benar:<br><br>${tampil}`,
opsi,
opsi.indexOf(benar)
]);

}

// ambil unik
return pickUnique(bank,n);

}

// ================= KUBUS 3D =================
function genRuang(n){
let bank=[];

for(let i=0;i<100;i++){
bank.push([
"<div style='width:60px;height:60px;background:linear-gradient(45deg,#aaa,#333);transform:rotateX(30deg) rotateY(30deg);margin:auto'></div><br>Jumlah sisi kubus?",
["4","6","8","12"],
"B"
]);
}

return pickUnique(bank,n);
}

// ================= BENTUK =================
function genBentuk(n){
let bank=[];

for(let i=0;i<100;i++){
bank.push([
"Pilih bentuk segitiga:",
["circle","square","triangle","cube"],
"C"
]);
}

return pickUnique(bank,n);
}

// ================= INIT =================
let data = [
genBahasa(50),
genHitung(31),
genUmum(40),
genPola(55),
genRuang(27),
genBentuk(25)
];

let sub=0,q=0,time=420,benar=0;

// ================= LOAD =================
function load(){
document.getElementById("judul").innerText =
config[sub].nama+" ("+(q+1)+"/"+config[sub].jumlah+")";

let soal=data[sub][q];
document.getElementById("soal").innerHTML=soal[0];

let html="";
soal[1].forEach((o,i)=>{
let h=String.fromCharCode(65+i);

let visual=o;
if(["circle","square","triangle","cube"].includes(o)){
visual = `<div class='shape ${o}'></div>`;
}

html+=`<button onclick="jawab('${h}','${soal[1][0]}')">${h}. ${visual}</button>`;
});

document.getElementById("opsi").innerHTML=html;
}

// ================= JAWAB =================
function jawab(h,benarText){
if(data[sub][q][1][0]===benarText) benar++;
}

// ================= NEXT =================
function next(){
q++;
if(q>=config[sub].jumlah){
sub++; q=0; time=420;
if(sub>=config.length){finish();return;}
}
load();
}

// ================= FINISH =================
function finish(){
let status=benar>=110?"LULUS":"TIDAK LULUS";
alert("Benar: "+benar+"\nStatus: "+status);
}

// ================= TIMER =================
setInterval(()=>{
time--;
let m=Math.floor(time/60),s=time%60;
document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

if(time<=0){
sub++; q=0; time=420;
if(sub>=config.length) finish();
else load();
}
},1000);

load();

</script>
