<script>

// ================= CONFIG =================
const config = [
{nama:"Bahasa", jumlah:50},
{nama:"Hitungan", jumlah:31},
{nama:"Pengetahuan Umum", jumlah:40},
{nama:"Pola Gambar", jumlah:55},
{nama:"Abstrak Ruang", jumlah:27},
{nama:"Bentuk", jumlah:25}
];

// ================= UTIL =================
function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

function pickUnique(arr,n){
let set = new Set();
let result=[];
while(result.length<n){
let item = arr[Math.floor(Math.random()*arr.length)];
let key = JSON.stringify(item);
if(!set.has(key)){
set.add(key);
result.push(item);
}
}
return result;
}

// ================= BAHASA =================
function genBahasa(n){
let bank=[];

const pasangan = [
["besar","agung","kecil"],
["cepat","sigap","lambat"],
["cerdas","pintar","bodoh"],
["tinggi","menjulang","rendah"],
["panas","terik","dingin"],
["kuat","kokoh","lemah"]
];

for(let i=0;i<200;i++){
let p = pasangan[i % pasangan.length];
let tipe = i%2===0 ? "Sinonim" : "Antonim";

let benar = tipe==="Sinonim"?p[1]:p[2];
let opsi = shuffle([benar,"opsi1","opsi2","opsi3"]);

bank.push([
`${tipe} dari '${p[0]}' ?`,
opsi,
opsi.indexOf(benar)
]);
}

return pickUnique(bank,n);
}

// ================= HITUNG =================
function genHitung(n){
let bank=[];

for(let i=0;i<300;i++){
let a=Math.floor(Math.random()*50);
let b=Math.floor(Math.random()*50);
let benar=a+b;

let opsi = shuffle([benar,benar+1,benar-1,benar+2].map(String));

bank.push([
`${a} + ${b} = ?`,
opsi,
opsi.indexOf(String(benar))
]);
}

return pickUnique(bank,n);
}

// ================= UMUM =================
function genUmum(n){
let bank=[];

const data = [
["Ibukota Indonesia","Jakarta"],
["Planet terbesar","Jupiter"],
["Presiden pertama","Soekarno"],
["Benua terbesar","Asia"],
["Gunung tertinggi","Everest"]
];

for(let i=0;i<200;i++){
let d=data[i%data.length];

let opsi = shuffle([d[1],"opsi1","opsi2","opsi3"]);

bank.push([
d[0]+" ?",
opsi,
opsi.indexOf(d[1])
]);
}

return pickUnique(bank,n);
}

// ================= POLA (SERI) =================
function genPola(n){
let bank=[];

const cerita = [
["😴","🚿","🍞","🏃"],
["🌱","💧","🌿","🌾"],
["🛒","🍳","🍽️","😋"],
["📚","📝","🎓","🎉"]
];

for(let i=0;i<200;i++){
let c = cerita[i%cerita.length];
let acak = shuffle([...c]);

let benar = c.join("");
let opsi = shuffle([
benar,
shuffle([...c]).join(""),
shuffle([...c]).join(""),
shuffle([...c]).join("")
]);

bank.push([
"Susun urutan benar:<br>"+acak.join(" ➜ "),
opsi,
opsi.indexOf(benar)
]);
}

return pickUnique(bank,n);
}

// ================= RUANG (KUBUS) =================
function genRuang(n){
let bank=[];

for(let i=0;i<100;i++){
let opsi=["4","6","8","12"];

bank.push([
"<div style='width:60px;height:60px;background:linear-gradient(45deg,#aaa,#333);transform:rotateX(30deg) rotateY(30deg);margin:auto'></div><br>Jumlah sisi kubus?",
opsi,
1
]);
}

return pickUnique(bank,n);
}

// ================= BENTUK =================
function genBentuk(n){
let bank=[];

for(let i=0;i<100;i++){
let opsi = ["circle","square","triangle","cube"];

bank.push([
"Pilih bentuk segitiga:",
opsi,
2
]);
}

return pickUnique(bank,n);
}

// ================= INIT =================
let data = [
genBahasa(50),
genHitung(31),
genUmum(40),
genPola(55),
genRuang(27),
genBentuk(25)
];

let sub=0,q=0,time=420,benar=0;

// ================= LOAD =================
function load(){
document.getElementById("judul").innerText =
config[sub].nama+" ("+(q+1)+"/"+config[sub].jumlah+")";

let soal=data[sub][q];
document.getElementById("soal").innerHTML=soal[0];

let html="";
soal[1].forEach((o,i)=>{
html+=`<button onclick="jawab(${i})">${String.fromCharCode(65+i)}. ${o}</button>`;
});

document.getElementById("opsi").innerHTML=html;
}

// ================= JAWAB =================
function jawab(i){
if(i===data[sub][q][2]) benar++;
}

// ================= NEXT =================
function next(){
q++;
if(q>=config[sub].jumlah){
sub++; q=0; time=420;
if(sub>=config.length){finish();return;}
}
load();
}

// ================= FINISH =================
function finish(){
let status=benar>=110?"LULUS":"TIDAK LULUS";
alert("Benar: "+benar+"\nStatus: "+status);
}

// ================= TIMER =================
setInterval(()=>{
time--;
let m=Math.floor(time/60),s=time%60;
document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

if(time<=0){
sub++; q=0; time=420;
if(sub>=config.length) finish();
else load();
}
},1000);

load();

</script>
